name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AI_PROVIDER: ${{ vars.AI_PROVIDER }}
  AI_MODEL: ${{ vars.AI_MODEL }}
  MEMORY_PROVIDER: ${{ vars.MEMORY_PROVIDER }}
  VECTOR_PROVIDER: ${{ vars.VECTOR_PROVIDER }}
  EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
  EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
  OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
  LMSTUDIO_BASE_URL: ${{ vars.LMSTUDIO_BASE_URL }}
  OPENCLAW_BASE_URL: ${{ vars.OPENCLAW_BASE_URL }}
  HERMES_BASE_URL: ${{ vars.HERMES_BASE_URL }}
  QDRANT_URL: ${{ vars.QDRANT_URL }}
  MCP_ENABLED: ${{ vars.MCP_ENABLED }}
  KORTEX_DEBUG: ${{ vars.KORTEX_DEBUG }}
  LOG_LEVEL: ${{ vars.LOG_LEVEL }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
  HERMES_TOKEN: ${{ secrets.HERMES_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}

jobs:
  monorepo:
    name: Lint, build & test
    runs-on: ubuntu-latest
    env:
      CI_LITE: "true"
      AI_PROVIDER: openai
      AI_MODEL: gpt-4o-mini
      OPENAI_API_KEY: sk-test-ci-placeholder
      MEMORY_PROVIDER: none
      VECTOR_PROVIDER: none
      EMBEDDING_PROVIDER: provider
      MCP_ENABLED: "false"
      KORTEX_DEBUG: "false"
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4

      - name: Validate GitHub secrets/variables
        run: bash scripts/check-github-env.sh

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  docs-site:
    name: Docs site build
    runs-on: ubuntu-latest
    needs: [monorepo]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        run: pnpm --filter @kortex/ui build && pnpm --filter @kortex/docs-site build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [monorepo, docs-site]
    env:
      CI_LITE: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner for GHCR
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build docs-site image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/docs-site/Dockerfile
          push: false
          tags: ghcr.io/${{ steps.ghcr.outputs.owner }}/kortex-docs-site:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vercel:
    name: Deploy docs site to Vercel
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [monorepo, docs-site]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Vercel deploy secrets
        run: |
          test -n "$VERCEL_ORG_ID" || (echo "Missing VERCEL_ORG_ID — run scripts/sync-github-env.sh" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing VERCEL_PROJECT_ID" && exit 1)
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN" && exit 1)

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Point Vercel project at docs-site
        run: |
          curl -fsS -X PATCH \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}?teamId=${VERCEL_ORG_ID}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/docs-site","framework":"nextjs"}'

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to $url"

      - name: Smoke test docs page
        run: |
          url="https://kortex-chatbot-demo.vercel.app"
          for attempt in 1 2 3 4 5; do
            html=$(curl -fsS "$url/")
            if echo "$html" | grep -q "KORTEX"; then
              echo "Production alias OK (attempt $attempt)"
              break
            fi
            echo "Waiting for production alias… attempt $attempt"
            sleep 5
          done
          echo "$html" | grep -q "KORTEX" || (echo "Expected docs-site shell (KORTEX) at $url" && exit 1)
          echo "$html" | grep -q "Kortex Chat" && (echo "Old chatbot-demo page still deployed" && exit 1) || true
