version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kortex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kortex
    ports:
      - '5432:5432'
    volumes:
      - kortex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kortex-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: kortex-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - kortex_qdrant_data:/qdrant/storage

volumes:
  kortex_pg_data:
  kortex_qdrant_data:
